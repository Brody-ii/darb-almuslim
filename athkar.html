<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
  <!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="درب المسلم">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درب المسلم - نسخة أحمد المعتمدة</title>
    <script src="tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        /* 1. الخلفية العامة المتدرجة والمتناغمة مع الوضعين الفاتح والمظلم */
        body { 
            font-family: 'Tajawal', sans-serif; 
            transition: background-color 0.3s; 
            background: linear-gradient(135deg, #f3f4f6 0%, #ecfdf5 100%);
            background-attachment: fixed;
        }
        html.dark body {
            background: linear-gradient(135deg, #111827 0%, #064e3b 100%);
            background-attachment: fixed;
        }
        .quran-font { font-family: 'Amiri', serif; line-height: 2.2; }
        
        /* 2. أنيميشن القفز والارتداد المرن الجديد عند التنقل بين الصفحات */
        .page { 
            display: none; 
            min-height: 100vh; 
            padding-bottom: 140px; 
            opacity: 0;
            transform: scale(0.93) translateY(30px);
            transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .page.active { 
            display: block; 
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        
        /* 3. فقاعات عائمة ضبابية زجاجية متوافقة مع الخلفية مع التوهج التفاعلي (Hover Glow) */
        .green-card { 
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.85), rgba(6, 78, 59, 0.9)); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white; 
            border-radius: 2.5rem; 
            position: relative; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .green-card:hover {
            box-shadow: 0 15px 30px -5px rgba(5, 150, 105, 0.3);
        }
        
        .zekr-card { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 1.5rem; 
            padding: 20px; 
            border-right: 6px solid #059669; 
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.05); 
            margin-bottom: 15px; 
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .zekr-card:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(5, 150, 105, 0.15);
            border-color: rgba(5, 150, 105, 0.3);
        }
        .zekr-card:active { transform: scale(0.99) translateY(0); }
        
        .dark .zekr-card { 
            background: rgba(31, 41, 55, 0.65); 
            border-right-color: #10b981; 
            color: white; 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
        }
        .dark .zekr-card:hover {
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
        }
        
        /* أزرار مخصصة بالتوهج والحركة المرنة */
        .glass-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(5, 150, 105, 0.2);
            background: rgba(255, 255, 255, 0.85);
        }
        .glass-btn:active { transform: scale(0.95) translateY(0); }
        
        .dark .glass-btn {
            background: rgba(31, 41, 55, 0.7);
            border-color: rgba(55, 65, 81, 0.5);
        }
        .dark .glass-btn:hover {
            box-shadow: 0 12px 20px -8px rgba(16, 115, 81, 0.4);
            background: rgba(31, 41, 55, 0.85);
        }

        .count-btn { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 1rem; width: 100%; font-weight: bold; padding: 12px; margin-top: 10px; border: 1px solid transparent; }
        .count-btn:active { transform: scale(0.96); }
        .count-btn.active { background-color: #ecfdf5; color: #059669; border-color: #10b981; }
        .count-btn.active:hover { box-shadow: 0 0 12px rgba(16, 185, 129, 0.2); }
        .dark .count-btn.active { background-color: #064e3b; color: #ecfdf5; border-color: #059669; }
        .dark .count-btn.active:hover { box-shadow: 0 0 15px rgba(5, 150, 105, 0.4); }
        .count-btn.done { background-color: rgba(241, 245, 249, 0.5); color: #94a3b8; cursor: default; transform: none !important; box-shadow: none !important; }
        .dark .count-btn.done { background-color: rgba(55, 65, 81, 0.5); color: #6b7280; }
        
        /* 4. شريط التنقل السفلي - تأثير الزجاج الضبابي مع كبسولة المؤشر العائمة الذكية */
        .nav-bar { 
            position: fixed; 
            bottom: 25px; 
            left: 20px; 
            right: 20px; 
            background: rgba(255, 255, 255, 0.55); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            display: flex; 
            justify-content: space-around; 
            padding: 10px; 
            z-index: 1000; 
            border-radius: 2.2rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }
        .dark .nav-bar { 
            background: rgba(17, 24, 39, 0.55); 
            border-color: rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
        }
        .nav-bar button {
            position: relative;
            z-index: 2;
            flex: 1;
            padding: 6px 0;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }
        .nav-bar button:active { transform: scale(0.9); }
        
        /* فقاعة مؤشر القائمة الحالية العائمة والخلفية */
      /* تحديث فقاعة مؤشر القائمة الحالية */
.nav-indicator {
    position: absolute;
    bottom: 8px;
    top: 8px;
    /* نجعل العرض ثابت بنسبة من مساحة البار */
    width: calc(50% - 15px); 
    background: rgba(5, 150, 105, 0.2);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-radius: 1.6rem;
    z-index: 1;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    border: 1px solid rgba(5, 150, 105, 0.25);
    /* لضمان البداية من اليمين تماماً في وضع RTL */
    right: 10px; 
    left: auto;
    transform: translateX(0);
        }
        .dark .nav-indicator {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.25);
        }
        
        /* كروت تدارك المهام الضبابية */
        .missed-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 18px; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 1.4rem; 
            margin-bottom: 8px; 
            border: 1px solid rgba(241, 245, 249, 0.8); 
            transition: all 0.3s ease;
        }
        .dark .missed-item { background: rgba(31, 41, 55, 0.6); border-color: rgba(55, 65, 81, 0.3); }
        .missed-item:hover { transform: scale(1.01); background: rgba(255, 255, 255, 0.75); }
        .dark .missed-item:hover { background: rgba(31, 41, 55, 0.75); }
        .missed-item span { transition: all 0.3s ease; }
        .missed-item span.done { text-decoration: line-through; opacity: 0.4; transform: translateX(-5px); }
        
        button, input[type="checkbox"] {
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* توهج تفاعلي خفيف لمدخلات الوقت والتعديلات الصامتة */
        input[type="time"], input[type="text"] {
            transition: all 0.3s ease;
        }
        input[type="time"]:focus, input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(5, 150, 105, 0.2);
        }
    </style>
</head>
<body class="dark:text-white">

<div class="max-w-md mx-auto bg-white/40 dark:bg-gray-900/40 shadow-2xl relative min-h-screen border-x border-gray-200/20 dark:border-gray-800/20">

    <div id="homePage" class="page active p-5">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-emerald-800 dark:text-emerald-400">درب المسلم</h1>
            <div class="flex gap-2">
                <button onclick="showPage('settingsPage')" class="p-2 bg-white/80 dark:bg-gray-800/80 rounded-xl active:scale-90 shadow-sm hover:shadow-md">⚙️</button>
                <button onclick="toggleDarkMode()" class="p-2 bg-white/80 dark:bg-gray-800/80 rounded-xl active:scale-90 shadow-sm hover:shadow-md">🌓</button>
            </div>
        </div>
        
        <div class="green-card p-6 mb-6 shadow-xl">
            <div class="flex justify-between items-start mb-4">
                <div id="fullDate" class="text-[11px] font-bold opacity-95 leading-relaxed text-right"></div>
                <div class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">إنجاز اليوم: <span id="dailyCount">0</span></div>
            </div>
            <h2 class="text-lg font-bold mb-1 text-yellow-300">تذكير اليوم</h2>
            <div id="randomAyah" class="text-md quran-font opacity-95">"فَاذْكُرُونِي أَذْكُرْكُمْ"</div>
        </div>

        <div class="mb-8">
            <h3 class="text-sm font-bold mb-3 text-emerald-700 dark:text-emerald-400">🕒 تدارك ما فاتك اليوم:</h3>
            <div id="missedTasksContainer" class="space-y-2"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showPage('quranPage')" class="glass-btn p-8 rounded-[2rem] text-center shadow-sm hover:shadow-md">
                <span class="text-4xl block mb-2">📖</span>
                <p class="font-bold text-xs text-gray-800 dark:text-gray-200">المصحف</p>
            </button>
            <button onclick="showPage('azkarPage')" class="glass-btn p-8 rounded-[2rem] text-center shadow-sm hover:shadow-md">
                <span class="text-4xl block mb-2">📿</span>
                <p class="font-bold text-xs text-gray-800 dark:text-gray-200">الأذكار</p>
            </button>
        </div>
    </div>

    <div id="azkarPage" class="page p-5">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showPage('homePage')" class="text-emerald-600 text-xl font-bold active:scale-75">←</button>
            <h2 class="text-2xl font-bold">حصن المسلم</h2>
        </div>
        
        <div class="flex gap-2 mb-6 bg-white/50 dark:bg-gray-800/50 backdrop-blur-md p-1 rounded-2xl border border-gray-200/30">
            <button id="sabah-btn" onclick="switchTab('صباح')" class="flex-1 py-3 rounded-xl font-bold bg-emerald-600 text-white shadow-lg transition-all duration-300">أذكار الصباح 🌤️</button>
            <button id="masaa-btn" onclick="switchTab('مساء')" class="flex-1 py-3 rounded-xl font-bold text-gray-400 transition-all duration-300">أذكار المساء 🌙</button>
        </div>
        
        <div id="azkar-list" class="space-y-4"></div>
        
        <button id="reset-current-btn" onclick="resetCurrentCategory()" class="w-full py-4 text-red-500 font-bold text-xs bg-red-50/60 dark:bg-red-900/10 backdrop-blur-md rounded-2xl mt-8 mb-10 border border-dashed border-red-200 active:scale-98">تصفير عداد القسم الحالي فقط</button>
    </div>

    <div id="profilePage" class="page p-5">
        <h2 class="text-2xl font-bold mb-10 text-center mt-6">الملف الشخصي</h2>
        <div class="text-center">
            <div class="w-24 h-24 bg-emerald-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-4xl font-bold shadow-xl">أ</div>
            <h2 class="text-2xl font-bold">أحمد</h2>
            <p class="text-gray-500 text-sm dark:text-gray-400">طالب بجامعة أم القرى 🎓</p>
        </div>
        
        <div class="mt-10 space-y-4">
            <div class="bg-gradient-to-r from-emerald-600 to-teal-700 p-6 rounded-[2rem] flex justify-between items-center shadow-lg text-white border border-white/10">
                <div>
                    <p class="text-xs opacity-80 font-bold uppercase text-right">الإنجاز الكلي مدى الحياة</p>
                    <p id="totalLifetime" class="text-3xl font-bold">0</p>
                </div>
                <span class="text-4xl">🏆</span>
            </div>
            <p class="text-[10px] text-center text-gray-400 px-4">الإنجاز الكلي لا يتأثر بالتصفير اليومي.</p>
        </div>
    </div>

    <div id="quranPage" class="page p-5">
        <button onclick="showPage('homePage')" class="mb-4 text-emerald-600 font-bold active:scale-95">← رجوع</button>
        <input id="searchSurah" oninput="filterSurahs()" type="text" placeholder="ابحث عن سورة..." class="w-full p-4 mb-6 rounded-2xl border bg-white/70 dark:bg-gray-800/70 backdrop-blur-md outline-none focus:border-emerald-500 transition-all">
        <div id="surahList" class="space-y-2"></div>
    </div>

    <div id="settingsPage" class="page p-5">
        <button onclick="showPage('homePage')" class="mb-6 text-emerald-600 font-bold active:scale-95">← رجوع</button>
        <h2 class="text-2xl font-bold mb-8 text-right">التذكيرات</h2>
        <div class="space-y-6">
            <div class="bg-white/60 dark:bg-gray-800/60 backdrop-blur-md p-5 rounded-2xl text-right border border-gray-200/20"><p class="text-xs mb-2">أذكار الصباح</p><input type="time" id="timeMorning" class="w-full bg-transparent outline-none"></div>
            <div class="bg-white/60 dark:bg-gray-800/60 backdrop-blur-md p-5 rounded-2xl text-right border border-gray-200/20"><p class="text-xs mb-2">أذكار المساء</p><input type="time" id="timeEvening" class="w-full bg-transparent outline-none"></div>
            <button onclick="saveSettings()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg text-right px-10 active:scale-95 hover:shadow-emerald-500/20">حفظ المواعيد</button>
        </div>
    </div>

    <div id="surahView" class="page p-5">
        <button onclick="showPage('quranPage')" class="mb-6 text-emerald-600 font-bold active:scale-95">← رجوع</button>
        <div id="surahContent" class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl p-8 rounded-[3rem] shadow-sm quran-font text-xl leading-loose text-right border border-white/20"></div>
    </div>

    <!-- بار التنقل المصمم بتأثير الفقاعة الضبابية العائمة مع الكبسولة المتحركة -->
    <nav class="nav-bar max-w-md">
        <div id="navIndicator" class="nav-indicator"></div>
        <button onclick="showPage('homePage')" class="flex flex-col items-center opacity-100" id="nav-home">🏠<span class="text-[10px] font-bold">الرئيسية</span></button>
        <button onclick="showPage('profilePage')" class="flex flex-col items-center opacity-40" id="nav-profile">👤<span class="text-[10px] font-bold">البروفايل</span></button>
    </nav>
</div>

<script>
    const azkarStatic = {
        'صباح': [
            {id: 1, title: "آية الكرسي", zekr: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضِ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهو الْعَلِيُّ الْعَظِيمُ.", count: 1, desc: "مرة واحدة"},
            {id: 2, title: "سورة الإخلاص", zekr: "قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ", count: 3, desc: "3 مرات"},
            {id: 3, title: "سورة الفلق", zekr: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", count: 3, desc: "3 مرات"},
            {id: 4, title: "سورة الناس", zekr: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِن شَرِّ الْوَسْواسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ", count: 3, desc: "3 مرات"},
            {id: 5, title: "دعاء الصباح", zekr: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ.", count: 1, desc: "مرة واحدة"},
            {id: 6, title: "سيد الاستغفار", zekr: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي، فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ.", count: 1, desc: "مرة واحدة"},
            {id: 7, title: "دعاء العافية", zekr: "اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ.", count: 3, desc: "3 مرات"},

            {id: 5, title: "دعاء المساء", zekr: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا.", count: 1, desc: "مرة واحدة"},

            {id: 7, title: "دعاء العافية", zekr: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي.", count: 3, desc: "3 مرات"},
            {id: 8, title: "بسم الله الذي لا يضر", zekr: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", count: 3, desc: "3 مرات"},

            {id: 10, title: "سبحان الله وبحمده", zekr: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.", count: 100, desc: "100 مرة"},
            {id: 11, title: "لا إله إلا الله وحده لا شريك له", zekr: "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", count: 10, desc: "10 مرات"},
            {id: 12, title: "أستغفر الله وأتوب إليه", zekr: "أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ.", count: 100, desc: "100 مرة"}

    let currentCat = 'صباح';
    let progress = JSON.parse(localStorage.getItem('azkarProgress')) || {};
    let lifetimeCount = parseInt(localStorage.getItem('lifetimeCount')) || 0;
    let missedTasks = JSON.parse(localStorage.getItem('missedTasks')) || [
        { id: 'quran', text: 'قراءة ورد القرآن 📖', done: false },
        { id: 'sabah', text: 'أذكار الصباح 🌤️', done: false },
        { id: 'masaa', text: 'أذكار المساء 🌙', done: false }
    ];

    function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const targetPage = document.getElementById(id);
    targetPage.classList.add('active');
    
    document.getElementById('nav-home').classList.toggle('opacity-100', id === 'homePage');
    document.getElementById('nav-home').classList.toggle('opacity-40', id !== 'homePage');
    document.getElementById('nav-profile').classList.toggle('opacity-100', id === 'profilePage');
    document.getElementById('nav-profile').classList.toggle('opacity-40', id !== 'profilePage');
    
    // التعديل هنا: تحريك المؤشر بناءً على الصفحة
    const indicator = document.getElementById('navIndicator');
    if (id === 'homePage') {
        // يبقى في مكانه بجهة اليمين
        indicator.style.transform = 'translateX(0)';
    } else if (id === 'profilePage') {
        // يتحرك لليسار (القيمة بالموجب لأننا في RTL والتحريك لليسار يعني الابتعاد عن اليمين)
        // أو نستخدم نسبة مئوية دقيقة
        indicator.style.transform = 'translateX(calc(-100% - 10px))';
    }
    
    updateStats();
    window.scrollTo(0,0);
}

    function switchTab(cat) {
        currentCat = cat;
        document.getElementById('sabah-btn').className = cat === 'صباح' ? "flex-1 py-3 rounded-xl font-bold bg-emerald-600 text-white shadow-lg transition-all duration-300" : "flex-1 py-3 rounded-xl font-bold text-gray-400 transition-all duration-300";
        document.getElementById('masaa-btn').className = cat === 'مساء' ? "flex-1 py-3 rounded-xl font-bold bg-emerald-600 text-white shadow-lg transition-all duration-300" : "flex-1 py-3 rounded-xl font-bold text-gray-400 transition-all duration-300";
        renderAzkar();
    }

    function renderAzkar() {
        const list = document.getElementById('azkar-list');
        list.innerHTML = azkarStatic[currentCat].map((item, idx) => {
            const key = `${currentCat}-${idx}`;
            const count = progress[key] || 0;
            const isDone = count >= item.count;
            return `
                <div class="zekr-card text-right">
                    <p class="text-xs text-emerald-600 font-bold mb-1">${item.id}) ${item.title}</p>
                    <div class="text-lg font-bold mb-2 quran-font leading-relaxed">${item.zekr}</div>
                    <div class="text-[11px] text-gray-400 font-bold mb-3 border-t pt-2">${item.desc}</div>
                    <button onclick="pressCount('${key}', ${item.count})" class="count-btn ${isDone ? 'done' : 'active'}">
                        ${isDone ? '✅ تم الإنجاز' : `اضغط للتكرار (${count} / ${item.count})`}
                    </button>
                </div>`;
        }).join('');
    }

    function pressCount(key, max) {
        if (!progress[key]) progress[key] = 0;
        if (progress[key] < max) {
            progress[key]++;
            lifetimeCount++;
            localStorage.setItem('azkarProgress', JSON.stringify(progress));
            localStorage.setItem('lifetimeCount', lifetimeCount);
            renderAzkar();
            updateStats();
        }
    }

    function resetCurrentCategory() {
        if(confirm(`تصفير عداد ${currentCat}؟ (لن يؤثر على إنجازك الكلي)`)) {
            azkarStatic[currentCat].forEach((_, idx) => delete progress[`${currentCat}-${idx}`]);
            localStorage.setItem('azkarProgress', JSON.stringify(progress));
            renderAzkar();
            updateStats();
        }
    }

    function renderMissedTasks() {
        const container = document.getElementById('missedTasksContainer');
        container.innerHTML = missedTasks.map((task, idx) => `
            <div class="missed-item shadow-sm">
                <span class="text-xs font-bold ${task.done ? 'done text-gray-400' : ''}">${task.text}</span>
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${idx})" class="w-5 h-5 accent-emerald-600 scale-110 cursor-pointer">
            </div>`).join('');
    }

    function toggleTask(idx) {
        missedTasks[idx].done = !missedTasks[idx].done;
        localStorage.setItem('missedTasks', JSON.stringify(missedTasks));
        renderMissedTasks();
    }

    function updateStats() {
        let daily = Object.values(progress).reduce((a, b) => a + b, 0);
        if(document.getElementById('dailyCount')) document.getElementById('dailyCount').innerText = daily;
        if(document.getElementById('totalLifetime')) document.getElementById('totalLifetime').innerText = lifetimeCount;
    }

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function init() {
        const now = new Date();
        const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric'}).format(now);
        const miladi = new Intl.DateTimeFormat('ar-SA-u-ca-gregory', {day:'numeric', month:'long', year:'numeric'}).format(now);
        document.getElementById('fullDate').innerHTML = `${days[now.getDay()]} <br> ${hijri} هـ <br> ${miladi} م`;
        
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        
        renderAzkar();
        renderMissedTasks();
        updateStats();
    }

    // دوال القرآن المختصرة
    let allSurahs = [];
    async function fetchSurahs() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        allSurahs = data.data;
        renderSurahs(allSurahs);
    }
    function renderSurahs(list) {
        document.getElementById('surahList').innerHTML = list.map(s => `
            <div onclick="openSurah(${s.number}, '${s.name}')" class="p-4 bg-white/70 dark:bg-gray-800/70 backdrop-blur-md rounded-2xl border mb-2 cursor-pointer text-right active:scale-[0.98] transition-all duration-200 hover:border-emerald-500/50">
                <span class="font-bold">${s.number}. ${s.name}</span>
            </div>`).join('');
    }
    async function openSurah(id, name) {
        showPage('surahView');
        document.getElementById('surahContent').innerHTML = "جاري التحميل...";
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const data = await res.json();
        document.getElementById('surahContent').innerHTML = `<h2 class="text-center mb-6 text-emerald-600 font-bold">${name}</h2>` + 
            data.data.ayahs.map(a => `${a.text} ﴿${a.numberInSurah}﴾`).join(' ');
    }
    function filterSurahs() {
        const q = document.getElementById('searchSurah').value;
        renderSurahs(allSurahs.filter(s => s.name.includes(q)));
    }

    init();
    fetchSurahs();
</script>
